name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re)build a release for (e.g. v0.1.0)'
        required: true

# Build the release artifacts on a Mac runner. Two artifacts per arch:
#   - dafeng-wubi-<version>-<arch>.pkg       (double-click installer)
#   - dafeng-wubi-<version>-<arch>.tar.gz    (binary tarball for brew + manual)
# Both unsigned for the v0.1 series; sign + notarize is Phase 3.5.+
# work that needs an Apple Developer ID secret in this repo.

permissions:
  contents: write   # creates / updates GitHub releases

jobs:
  build-macos:
    # arm64 only for v0.1. Intel (macos-13) free-tier runners queue for
    # tens of minutes and routinely block the publish step from firing.
    # Apple Silicon coverage handles the practical-majority install
    # population today; an Intel build can land later when we either
    # have paid runners or move to a self-hosted Intel mac.
    name: macOS · ${{ matrix.arch }} · build + package
    strategy:
      matrix:
        include:
          - runner: macos-14         # Apple Silicon
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ inputs.tag || github.ref }}

      - name: Install build tools (brew)
        run: |
          brew update
          # dylibbundler is mandatory: build-pkg.sh uses it to walk the
          # dep graph + rewrite install_names so the .pkg works on
          # machines that have no Homebrew. Without it, build-pkg.sh
          # falls back to a 400 KB unbundled .pkg that crashes on
          # launch on stock macOS.
          brew install --quiet cmake ninja libgit2 llama.cpp dylibbundler

      - name: Configure (LLAMA_CPP=ON)
        run: |
          cmake -B build-llama -G Ninja \
                -DCMAKE_BUILD_TYPE=RelWithDebInfo \
                -DDAFENG_ENABLE_LLAMA_CPP=ON \
                -DDAFENG_ENABLE_GIT_SYNC=ON \
                -DDAFENG_BUILD_TESTS=OFF \
                -DDAFENG_BUILD_BENCHMARK=OFF

      - name: Build
        run: cmake --build build-llama -j

      - name: Build .pkg
        run: |
          BUILD_DIR=build-llama bash packaging/macos/build-pkg.sh

      - name: Build binary tarball
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          STAGE=$(mktemp -d)
          mkdir -p "$STAGE/dafeng-wubi-$VERSION-${{ matrix.arch }}"/{bin,share/dafeng}
          cp build-llama/src/daemon/dafeng-daemon "$STAGE/dafeng-wubi-$VERSION-${{ matrix.arch }}/bin/"
          cp build-llama/src/cli/dafeng-cli "$STAGE/dafeng-wubi-$VERSION-${{ matrix.arch }}/bin/"
          cp build-llama/src/plugin/dafeng_lua_bridge.so \
             "$STAGE/dafeng-wubi-$VERSION-${{ matrix.arch }}/share/dafeng/"
          cp src/plugin/{rime,dafeng_filter,dafeng_rerank}.lua \
             "$STAGE/dafeng-wubi-$VERSION-${{ matrix.arch }}/share/dafeng/"
          cp schemas/{wubi86_dafeng.schema.yaml,wubi86_dafeng.dict.yaml,dafeng_learned.dict.yaml} \
             "$STAGE/dafeng-wubi-$VERSION-${{ matrix.arch }}/share/dafeng/"
          cp packaging/macos/{com.dafeng.daemon.plist,install_launchagent.sh,deploy.sh} \
             "$STAGE/dafeng-wubi-$VERSION-${{ matrix.arch }}/share/dafeng/"
          cp install.sh CHANGELOG.md README.md LICENSE NOTICE \
             "$STAGE/dafeng-wubi-$VERSION-${{ matrix.arch }}/"
          tar -C "$STAGE" -czf "dist/dafeng-wubi-$VERSION-${{ matrix.arch }}.tar.gz" \
              "dafeng-wubi-$VERSION-${{ matrix.arch }}"
          ls -la dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dafeng-wubi-${{ matrix.arch }}
          path: dist/*

  publish-release:
    name: Publish GitHub Release
    needs: build-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Flatten + sha256
        run: |
          mkdir -p release/
          find artifacts -type f \( -name '*.pkg' -o -name '*.tar.gz' \) \
              -exec cp {} release/ \;
          (cd release && shasum -a 256 *.pkg *.tar.gz > SHA256SUMS.txt)
          ls -la release/

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # Print the section between `## [VERSION]` and the next `## [`.
          awk -v v="$VERSION" '
            /^## \[/{
              if (in_block) exit
              if ($0 ~ "^## \\[" v "\\]") in_block=1
              next
            }
            in_block { print }
          ' CHANGELOG.md > release-notes.md
          echo "notes_path=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create / update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          echo "publishing tag: $TAG"
          echo "files in release/:"
          ls -la release/

          # Explicit if/else (the previous `view && upload || create`
          # one-liner had two failure paths that both bash-shortcircuit
          # to exit 0 — the workflow looked successful but the release
          # never appeared). Now: detect existence, branch, fail loud.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists; uploading assets with --clobber"
            gh release upload "$TAG" release/* --clobber
          else
            echo "release $TAG does NOT exist; creating fresh"
            gh release create "$TAG" release/* \
              --title "$TAG" \
              --notes-file release-notes.md
          fi

          # Sanity gate: the release MUST be visible after this step,
          # else the workflow silently lied. Fail the step explicitly.
          echo "post-publish verification:"
          if ! gh release view "$TAG"; then
            echo "::error::Release $TAG not visible after publish; aborting" >&2
            exit 1
          fi
          echo "✓ release $TAG published with assets:"
          gh release view "$TAG" --json assets --jq '.assets[].name'
