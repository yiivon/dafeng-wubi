# Combined dictionary for the dafeng wubi schema.
# Composes the stock wubi86 dict + dafeng_learned (the daemon-grown user
# phrases). RIME builds a single binary table that contains both —
# typing one of the canonical wubi codes (e.g. xupw for 弹窗) returns
# the learned phrase as a candidate alongside any wubi86 stock match.
#
# wubi86.dict.yaml ships with the standard wubi86 schema (installed
# separately from rime/rime-wubi). dafeng_learned.dict.yaml is auto-
# generated by `dafeng-cli learn` (or daemon scheduler later); ships as
# an empty bootstrap so the import always resolves.

---
name: wubi86_dafeng
version: "1.0"
sort: by_weight
use_preset_vocabulary: false
columns:
  - text
  - code
  - weight
import_tables:
  - wubi86
  - dafeng_learned
...
